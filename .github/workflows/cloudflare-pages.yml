name: Deploy to Cloudflare Pages

# Requires two repo secrets: CLOUDFLARE_API_TOKEN (a scoped "Pages: Edit"
# token) and CLOUDFLARE_ACCOUNT_ID. Until they exist this workflow will fail,
# so it is committed only once the secrets are set.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Config-driven (wrangler.toml): deploys dist + the /count Function.
          command: pages deploy --branch=main
